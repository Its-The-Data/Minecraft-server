#!/bin/bash

echo "Checking for saved world..."

if [ -f world.zip ]; then
  echo "Restoring saved world..."
  unzip world.zip
fi

echo "Downloading Minecraft server..."
wget https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/416/downloads/paper-1.20.4-416.jar -O server.jar

echo "Accepting EULA..."
echo "eula=true" > eula.txt

echo "Starting server loop..."

while true
do
  echo "Launching Minecraft server..."

  java -Xms2G -Xmx4G -jar server.jar nogui

  echo "Server stopped or crashed."

  echo "Saving world..."
  zip -r world.zip world world_nether world_the_end 2>/dev/null

  echo "Restarting in 10 seconds..."
  sleep 10
done
